<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>おうちダッシュボード（Fire 7用）</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /*
          Fire 7（7インチ / 1024x600 / 低解像度）向け調整版
          - サイズはすべて clamp() で可変：CSS上の見かけ幅が1024pxでも約683pxでも画面ぴったりに収まる
          - レイアウトは flex 比率＋ min-height:0 で、はみ出さず・必要なら内側スクロール
          - iPadなど大きい画面でも上限値まで自然に拡大するので、そのまま使える
        */
        :root {
            --bg-color: #f0f4f8;
            --panel-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #a0aec0;
            --asa-color: #ff9f43;
            --asa-bg: #fff5eb;
            --yoru-color: #5f27cd;
            --yoru-bg: #f1ebff;
            --success-color: #2ed573;
            --success-bg: #e8f8f5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html { height: 100%; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: clamp(6px, 1.4vh, 15px);
            gap: clamp(6px, 1.3vh, 15px);
            overflow: hidden;
        }

        /* 上部：タブ切り替えヘッダー */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: clamp(42px, 9vh, 80px);
            gap: clamp(6px, 1.4vw, 20px);
            flex: 0 0 auto;
        }

        .tabs {
            display: flex;
            gap: clamp(6px, 1.2vw, 15px);
            flex: 1;
            height: 100%;
            min-width: 0;
        }

        .tab-button {
            flex: 1;
            min-width: 0;
            font-size: clamp(0.8rem, 2.4vw, 2rem);
            font-weight: bold;
            border: none;
            border-radius: clamp(10px, 1.6vw, 18px);
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 4px;
        }

        .tab-button.asa { background-color: #ffe0b2; color: #e65100; }
        .tab-button.asa.active { background-color: var(--asa-color); color: white; }

        .tab-button.yoru { background-color: #e0d4ff; color: #32107c; }
        .tab-button.yoru.active { background-color: var(--yoru-color); color: white; }

        .btn-group {
            display: flex;
            gap: clamp(5px, 1vw, 10px);
            height: 100%;
            flex: 0 0 auto;
        }

        .action-btn {
            height: 100%;
            padding: 0 clamp(8px, 1.6vw, 20px);
            background: #e2e8f0;
            color: #4a5568;
            border: none;
            font-size: clamp(0.72rem, 1.5vw, 1.2rem);
            border-radius: clamp(10px, 1.6vw, 18px);
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }

        /* 設定ポップアップ（モーダル背景） */
        .settings-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: clamp(8px, 2vh, 20px);
        }

        .settings-panel {
            background: white;
            padding: clamp(16px, 2.5vw, 30px);
            border-radius: clamp(16px, 2vw, 24px);
            width: 100%;
            max-width: 650px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            gap: clamp(10px, 1.6vh, 15px);
            max-height: 94vh;
            overflow-y: auto;
        }

        .settings-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .settings-panel strong { font-size: clamp(1rem, 1.8vw, 1.2rem); }
        .settings-panel small { font-size: clamp(0.7rem, 1.2vw, 0.85rem); }

        .settings-panel input {
            padding: clamp(7px, 1vh, 10px) 14px;
            font-size: clamp(0.9rem, 1.5vw, 1.1rem);
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            width: 100%;
        }

        .timetable-input-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .timetable-input-row span {
            font-size: clamp(1rem, 1.6vw, 1.2rem);
            font-weight: bold;
            width: 30px;
            color: #4a5568;
            flex: 0 0 auto;
        }

        /* メインレイアウト */
        .main-layout {
            display: flex;
            flex: 1;
            gap: clamp(8px, 1.4vw, 15px);
            min-height: 0;
        }

        .panel {
            background: var(--panel-bg);
            border-radius: clamp(12px, 2vw, 24px);
            padding: clamp(8px, 1.5vw, 20px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .panel-title {
            font-size: clamp(0.82rem, 1.9vw, 1.4rem);
            font-weight: bold;
            margin-bottom: clamp(6px, 1vh, 12px);
            padding-bottom: clamp(4px, 0.8vh, 8px);
            border-bottom: 3px solid #edf2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
            flex: 0 0 auto;
        }

        /* 左側：時間割（7インチでは狭くなりすぎないよう28%に） */
        .left-column { width: 28%; min-width: 0; }
        .timetable-list { flex: 1; display: flex; flex-direction: column; gap: clamp(4px, 0.8vh, 8px); overflow-y: auto; min-height: 0; }
        .timetable-item { display: flex; align-items: center; background: #f8fafc; padding: clamp(6px, 1vh, 12px) clamp(8px, 1.1vw, 15px); border-radius: clamp(8px, 1.2vw, 12px); font-size: clamp(0.78rem, 1.7vw, 1.3rem); font-weight: bold; }
        .timetable-num { background: #e2e8f0; color: #4a5568; width: clamp(22px, 3vw, 30px); height: clamp(22px, 3vw, 30px); display: flex; align-items: center; justify-content: center; border-radius: 50%; margin-right: clamp(8px, 1.1vw, 15px); font-size: clamp(0.72rem, 1.4vw, 1.1rem); flex: 0 0 auto; }

        /* 右側 */
        .right-column { width: 72%; display: flex; flex-direction: column; gap: clamp(8px, 1.3vh, 15px); min-height: 0; }

        /* 右上：カレンダー埋め込みエリア */
        .timetree-panel { flex: 0 0 auto; height: clamp(90px, 21vh, 180px); }
        .timetree-container { flex: 1; background: #f7fafc; border-radius: clamp(10px, 1.4vw, 14px); overflow: hidden; display: flex; align-items: center; justify-content: center; min-height: 0; }
        .timetree-iframe { width: 100%; height: 100%; border: none; }

        /* TimeTree用「ひらくボタン」 */
        .calendar-open-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            height: 100%;
            text-decoration: none;
            background: linear-gradient(135deg, #6c5ce7, #341f97);
            color: #ffffff;
            border-radius: clamp(10px, 1.4vw, 14px);
            font-weight: bold;
            text-align: center;
            padding: 10px;
        }
        .calendar-open-btn:active { transform: scale(0.98); }
        .calendar-open-btn .big { font-size: clamp(1rem, 2.6vw, 1.9rem); }
        .calendar-open-btn .small { font-size: clamp(0.68rem, 1.4vw, 0.9rem); opacity: 0.85; }

        /* 右下：タスクリスト */
        .task-panel { flex: 1 1 auto; position: relative; min-height: 0; }
        .congratulations { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; font-size: clamp(1.6rem, 5.5vw, 3.5rem); font-weight: bold; color: var(--success-color); width: 100%; animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .task-grid {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: clamp(6px, 1vh, 10px);
            overflow-y: auto;
            padding-right: 5px;
            min-height: 0;
        }

        .task-item { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: clamp(6px, 1vh, 12px) clamp(12px, 2vw, 25px); border-radius: clamp(12px, 1.8vw, 18px); border: 3px solid transparent; transition: all 0.2s ease; min-height: clamp(34px, 7vh, 65px); }
        .task-item.asa-mode { background-color: var(--asa-bg); }
        .task-item.yoru-mode { background-color: var(--yoru-bg); }
        .task-text { font-size: clamp(0.95rem, 2.1vw, 1.8rem); font-weight: bold; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
        .task-item.checked { background-color: var(--success-bg) !important; border-color: var(--success-color); }
        .task-item.checked .task-text { color: #27ae60; }

        .check-btn { font-size: clamp(0.8rem, 1.7vw, 1.4rem); font-weight: bold; padding: clamp(6px, 1vh, 10px) clamp(12px, 2vw, 25px); border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); min-width: clamp(82px, 12vw, 130px); flex: 0 0 auto; transition: all 0.1s ease; }
        .check-btn.btn-active { background-color: #ffbe76; color: white; }
        .check-btn.btn-checked { background-color: var(--success-color); color: white; box-shadow: none; }
        .check-btn:active { transform: scale(0.95); }

        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="tabs">
            <button class="tab-button asa active" onclick="switchTab('asa')">☀️ 朝にやること</button>
            <button class="tab-button yoru" onclick="switchTab('yoru')">🌙 夜にやること</button>
        </div>
        <div class="btn-group">
            <button class="action-btn" onclick="openSettings()">⚙️ 設定</button>
            <button class="action-btn" style="background:#eaeaea;" onclick="resetCurrentTab()">リセット</button>
        </div>
    </header>

    <div id="settings-overlay" class="settings-overlay">
        <div class="settings-panel">
            <div class="settings-section">
                <strong>📅 カレンダー埋め込み設定</strong>
                <input type="text" id="input-embed-url" placeholder="Googleカレンダーの「埋め込みコード」またはURLを貼り付け">
                <small style="color:#718096; line-height:1.6;">
                    <b style="color:#e53e3e;">⚠️ TimeTreeは仕組み上ページ内に埋め込めません（「接続が拒否されました」になります）。</b><br>
                    ▶ <b>おすすめ：</b>パソコンのGoogleカレンダー →「設定 → カレンダーの統合 → 埋め込みコード」からコピーしたコードを貼ると、ここにそのまま表示されます。<br>
                    ▶ TimeTreeのURLを貼った場合は、代わりに「タップでアプリを開くボタン」を表示します。
                </small>
            </div>
            <div class="settings-section">
                <strong>🏫 じかんわり設定（カンマ「,」で区切ってね）</strong>
                <div class="timetable-input-row"><span>月</span><input type="text" id="input-tt-1" placeholder="例: こくご,さんすう,たいいく"></div>
                <div class="timetable-input-row"><span>火</span><input type="text" id="input-tt-2"></div>
                <div class="timetable-input-row"><span>水</span><input type="text" id="input-tt-3"></div>
                <div class="timetable-input-row"><span>木</span><input type="text" id="input-tt-4"></div>
                <div class="timetable-input-row"><span>金</span><input type="text" id="input-tt-5"></div>
            </div>
            <button class="action-btn" style="height:clamp(44px,6vh,50px); background:#4a5568; color:white; font-size:clamp(1rem,1.6vw,1.3rem); margin-top:6px;" onclick="saveSettings()">保存して閉じる</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="panel left-column">
            <div class="panel-title">
                <span id="timetable-title">じかんわり</span>
                <span id="timetable-day" style="color: #718096; font-size: clamp(0.72rem,1.4vw,1.1rem);">(月)</span>
            </div>
            <div id="timetable-list" class="timetable-list"></div>
        </div>

        <div class="right-column">
            <div class="panel timetree-panel">
                <div class="panel-title">📅 今日のよてい</div>
                <div id="timetree-container" class="timetree-container">
                    <div style="color:#718096; text-align:center; padding:10px; font-size:clamp(0.75rem,1.5vw,1rem);">⚙️ 設定からカレンダーの埋め込みURLを入力してください。</div>
                </div>
            </div>

            <div class="panel task-panel">
                <div id="congrats-screen" class="congratulations">🎉 よくできました！ 🎉</div>
                <div id="task-grid" class="task-grid"></div>
            </div>
        </div>
    </div>

    <script>
        const taskData = {
            asa: [
                { id: 'a1', text: 'はみがき' },
                { id: 'a2', text: 'ハンカチ・ティッシュ' },
                { id: 'a3', text: 'ランチョンマット' },
                { id: 'a4', text: 'こうぼう' },
                { id: 'a5', text: 'すいとう' }
            ],
            yoru: [
                { id: 'y1', text: 'れんらくちょうを出す' },
                { id: 'y2', text: 'ハンカチ・ティッシュを出す' },
                { id: 'y3', text: 'しゅくだい' },
                { id: 'y4', text: 'タブレットじゅうでん' },
                { id: 'y5', text: 'えんぴつけずり' },
                { id: 'y6', text: 'あしたの持ち物かくにん' }
            ]
        };

        const defaultTimetable = {
            1: ['こくご', 'さんすう', 'たいいく', 'おんがく', 'ずこう'],
            2: ['さんすう', 'こくご', 'りか', 'しゃかい', 'どうとく'],
            3: ['こくご', 'さんすう', 'えいご', 'プログラミング'],
            4: ['さんすう', 'こくご', 'たいいく', 'りか', 'しゃかい'],
            5: ['こくご', 'さんすう', 'ずこう', 'ずこう', 'かつどう']
        };

        let timetableData = JSON.parse(localStorage.getItem('dashboardTimetableData')) || defaultTimetable;
        const dayLabels = { 0: '日', 1: '月', 2: '火', 3: '水', 4: '木', 5: '金', 6: '土' };
        let currentTab = 'asa';
        let checkedStates = JSON.parse(localStorage.getItem('dashboardTaskStates')) || {};

        // 起動時に既に全部完了しているタブは「お祝い済み」とみなす（リロードのたびに勝手に祝わないため）
        let celebratedTabs = {};
        ['asa', 'yoru'].forEach(function (tab) {
            const tasks = taskData[tab];
            celebratedTabs[tab] = tasks.length > 0 && tasks.every(function (t) { return checkedStates[t.id]; });
        });
        let celebrationTimer = null;

        function getTargetDay() {
            const now = new Date();
            const currentDay = now.getDay();
            if (currentTab === 'asa') return currentDay;
            if (currentDay === 5 || currentDay === 6 || currentDay === 0) return 1;
            return currentDay + 1;
        }

        function renderTimetable() {
            const targetDay = getTargetDay();
            const listEl = document.getElementById('timetable-list');
            listEl.innerHTML = '';
            document.getElementById('timetable-title').innerText = currentTab === 'asa' ? '☀️ きょうの じかんわり' : '🌙 あしたの じかんわり';
            document.getElementById('timetable-day').innerText = `(${dayLabels[targetDay]}ようび)`;

            if (targetDay === 0 || targetDay === 6) {
                listEl.innerHTML = '<div class="timetable-item">おやすみです ＼(^o^)／</div>';
                return;
            }
            (timetableData[targetDay] || []).forEach((subject, index) => {
                const item = document.createElement('div');
                item.className = 'timetable-item';
                item.innerHTML = `<div class="timetable-num">${index + 1}</div><div>${subject}</div>`;
                listEl.appendChild(item);
            });
        }

        // 【重要】カレンダー表示ロジック
        //  ・TimeTree(timetreeapp.com) は X-Frame-Options: SAMEORIGIN のため iframe埋め込み不可
        //    → 「接続が拒否されました」になるので、代わりにタップで開くボタンを表示する
        //  ・Googleカレンダー等の埋め込み可能URL → これまで通り iframe で表示
        function updateTimeTreeCalendar() {
            const embedUrl = (localStorage.getItem('timetree_embed_url') || '').trim();
            const container = document.getElementById('timetree-container');

            if (!embedUrl) {
                container.innerHTML = '<div style="color:#718096; padding:10px; text-align:center; font-size:clamp(0.75rem,1.5vw,1rem);">⚙️ 設定からカレンダーの埋め込みURLを入力してください</div>';
                return;
            }

            // --- TimeTree は埋め込めない → 「ひらくボタン」にフォールバック ---
            if (/timetreeapp\.com/i.test(embedUrl)) {
                const safeUrl = embedUrl.replace(/"/g, '&quot;');
                container.innerHTML = `
                    <a class="calendar-open-btn" href="${safeUrl}" target="_blank" rel="noopener noreferrer">
                        <span class="big">📅 きょうのよていを ひらく</span>
                        <span class="small">タップすると TimeTree が ひらくよ</span>
                    </a>`;
                return;
            }

            // --- Googleカレンダー等：そのまま iframe 表示 ---
            const safeUrl = embedUrl.replace(/"/g, '&quot;');
            container.innerHTML = `<iframe src="${safeUrl}" class="timetree-iframe" loading="lazy"></iframe>`;
        }

        function renderTasks() {
            const gridEl = document.getElementById('task-grid');
            const congratsEl = document.getElementById('congrats-screen');
            gridEl.innerHTML = '';
            const currentTasks = taskData[currentTab];
            let allChecked = true;

            currentTasks.forEach(task => {
                const isChecked = !!checkedStates[task.id];
                if (!isChecked) allChecked = false;
                const item = document.createElement('div');
                item.className = `task-item ${currentTab}-mode ${isChecked ? 'checked' : ''}`;
                item.innerHTML = `
                    <div class="task-text">${task.text}</div>
                    <button class="check-btn ${isChecked ? 'btn-checked' : 'btn-active'}" onclick="toggleTask('${task.id}')">
                        ${isChecked ? 'できた！' : 'まだ'}
                    </button>
                `;
                gridEl.appendChild(item);
            });

            const isComplete = currentTasks.length > 0 && allChecked;

            if (isComplete && !celebratedTabs[currentTab]) {
                // 初めて全部そろった瞬間 → 「よくできました！」＋紙吹雪
                celebratedTabs[currentTab] = true;
                gridEl.style.display = 'none';
                congratsEl.style.display = 'block';
                triggerConfetti();
                // 紙吹雪が終わるころ（約2秒後）にタスクリスト表示へ戻す（チェックは「できた！」のまま）
                if (celebrationTimer) clearTimeout(celebrationTimer);
                celebrationTimer = setTimeout(function () {
                    congratsEl.style.display = 'none';
                    gridEl.style.display = 'flex';
                    celebrationTimer = null;
                }, 2000);
            } else {
                // 通常表示（未完了、または お祝い済みで全部できた状態）
                gridEl.style.display = 'flex';
                congratsEl.style.display = 'none';
                if (!isComplete) celebratedTabs[currentTab] = false; // 未完了に戻ったら、次にそろった時また祝う
            }
        }

        function toggleTask(id) {
            checkedStates[id] = !checkedStates[id];
            localStorage.setItem('dashboardTaskStates', JSON.stringify(checkedStates));
            renderTasks();
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tab-button.${tab}`).classList.add('active');
            renderAll();
        }

        function resetCurrentTab() {
            if(confirm('ぜんぶ「まだ」にもどしても いい？')) {
                taskData[currentTab].forEach(task => { checkedStates[task.id] = false; });
                localStorage.setItem('dashboardTaskStates', JSON.stringify(checkedStates));
                renderAll();
            }
        }

        function triggerConfetti() {
            var duration = 1.5 * 1000; var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0, y: 0.8 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1, y: 0.8 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        function openSettings() {
            document.getElementById('input-embed-url').value = localStorage.getItem('timetree_embed_url') || '';
            for (let i = 1; i <= 5; i++) {
                document.getElementById(`input-tt-${i}`).value = (timetableData[i] || []).join(',');
            }
            document.getElementById('settings-overlay').style.display = 'flex';
        }

        function saveSettings() {
            let embedUrl = document.getElementById('input-embed-url').value.trim();

            // <iframe src="..."> をまるごと貼られても、自動でURL部分だけ抜き出す
            if (embedUrl.includes('src="')) {
                embedUrl = embedUrl.split('src="')[1].split('"')[0];
            } else if (embedUrl.includes("src='")) {
                embedUrl = embedUrl.split("src='")[1].split("'")[0];
            }
            // 埋め込みコード中の &amp; を本来の & に戻す（Googleの埋め込みコード対策）
            embedUrl = embedUrl.replace(/&amp;/g, '&').trim();

            localStorage.setItem('timetree_embed_url', embedUrl);

            for (let i = 1; i <= 5; i++) {
                const text = document.getElementById(`input-tt-${i}`).value.trim();
                if (text) {
                    timetableData[i] = text.split(',').map(s => s.trim()).filter(s => s !== '');
                } else {
                    timetableData[i] = [];
                }
            }
            localStorage.setItem('dashboardTimetableData', JSON.stringify(timetableData));

            document.getElementById('settings-overlay').style.display = 'none';
            renderAll();
        }

        function renderAll() {
            renderTimetable();
            renderTasks();
            updateTimeTreeCalendar();
        }

        // 初回読み込み
        renderAll();

        // --- キオスク用：カレンダーとその日の表示を定期リフレッシュ ---
        // 30分ごとにGoogleカレンダーのiframeを再読込（新しい予定を反映＆通信復帰）
        setInterval(updateTimeTreeCalendar, 30 * 60 * 1000);
        // 日付が変わったら（＝深夜0時すぎ）ページを丸ごと再読込。
        //  - 「今日のじかんわり／今日のよてい」が翌日に切り替わる
        //  - Fireタブレットで長時間つけっぱなしにすると起きる「画面まっ白」問題を毎日リセットできる
        //  （Fully Kiosk の Auto Reload を併用すると、さらに安心です）
        let lastRenderedDay = new Date().getDate();
        setInterval(function () {
            const d = new Date().getDate();
            if (d !== lastRenderedDay) {
                lastRenderedDay = d;
                location.reload();
            }
        }, 5 * 60 * 1000);
    </script>
</body>
</html>
